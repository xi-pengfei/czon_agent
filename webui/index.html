<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>czon Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .msg-user  { background: #f4f4f5; }
    .msg-agent { background: #ffffff; border: 1px solid #e4e4e7; }
    .tool-row  { background: #fafafa; border-left: 3px solid #6366f1; }
    .tool-detail { display: none; white-space: pre-wrap; word-break: break-all; }
    .tool-detail.open { display: block; }
    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 3px; }
    textarea:focus { outline: none; box-shadow: 0 0 0 2px #6366f1; }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">

  <!-- 顶部栏 -->
  <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between flex-shrink-0">
    <span class="font-semibold text-gray-800 tracking-tight">czon_agent</span>
    <div class="flex items-center gap-2">
      <button id="new-chat-btn"
        class="text-sm border border-gray-200 rounded-md px-2 py-1 bg-white text-gray-600 hover:border-indigo-400 hover:text-indigo-600">
        新对话
      </button>
      <span class="text-sm text-gray-500">模型:</span>
      <select id="provider-select"
        class="text-sm border border-gray-200 rounded-md px-2 py-1 bg-white text-gray-700 cursor-pointer hover:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </select>
    </div>
  </header>

  <!-- 对话区域 -->
  <main id="chat-box" class="flex-1 overflow-y-auto px-4 py-6 space-y-4">
    <div id="empty-hint" class="text-center text-gray-400 text-sm mt-16">
      发送消息开始对话
    </div>
  </main>

  <!-- 底部输入区 -->
  <footer class="bg-white border-t border-gray-200 px-4 py-3 flex-shrink-0">
    <!-- 已选文件预览 -->
    <div id="file-preview" class="flex flex-wrap gap-2 mb-2 hidden"></div>
    <div class="flex items-end gap-2">
      <!-- 上传按钮 -->
      <label for="file-input" title="上传文件"
        class="flex-shrink-0 w-9 h-9 flex items-center justify-center rounded-lg border border-gray-200 text-gray-400 hover:text-indigo-600 hover:border-indigo-400 cursor-pointer transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
        </svg>
      </label>
      <input id="file-input" type="file" multiple class="hidden" />

      <!-- 文本输入 -->
      <textarea id="input-text" rows="1"
        placeholder="输入内容… (Enter 发送，Shift+Enter 换行)"
        class="flex-1 resize-none rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-800 placeholder-gray-400 transition-all max-h-40 overflow-y-auto"></textarea>

      <!-- 发送按钮 -->
      <button id="send-btn"
        class="flex-shrink-0 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
        发送
      </button>
    </div>
  </footer>

<script>
// ── 状态 ────────────────────────────────────────────────
let uploadedAttachments = [];  // 已上传附件
const ls = localStorage;
const ss = sessionStorage;
const messageStates = new Map();
const confirmingIds = new Set();
let sessionId = ss.getItem('czon_agent_session_id') || createSessionId();
ss.setItem('czon_agent_session_id', sessionId);

// ── 初始化 providers ─────────────────────────────────────
async function loadProviders() {
  const sel = document.getElementById('provider-select');
  try {
    const res = await fetch('/api/providers');
    const providers = await res.json();
    sel.innerHTML = '';
    providers.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name + (p.configured ? '' : ' (未配置)');
      if (!p.configured) opt.disabled = true;
      sel.appendChild(opt);
    });
    // 恢复上次选择
    const saved = ls.getItem('czon_agent_provider');
    if (saved && [...sel.options].some(o => o.value === saved && !o.disabled)) {
      sel.value = saved;
    }
  } catch (e) {
    sel.innerHTML = '<option value="kimi">kimi</option>';
  }
  sel.addEventListener('change', () => ls.setItem('czon_agent_provider', sel.value));
}

// ── 文件上传 ─────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', async (e) => {
  await handleFiles(e.target.files);
  e.target.value = '';
});

// 拖拽上传
const inputArea = document.getElementById('input-text');
inputArea.addEventListener('dragover', e => { e.preventDefault(); inputArea.classList.add('border-indigo-400'); });
inputArea.addEventListener('dragleave', () => inputArea.classList.remove('border-indigo-400'));
inputArea.addEventListener('drop', async (e) => {
  e.preventDefault();
  inputArea.classList.remove('border-indigo-400');
  await handleFiles(e.dataTransfer.files);
});

async function handleFiles(files) {
  const preview = document.getElementById('file-preview');
  preview.classList.remove('hidden');
  for (const file of files) {
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch('/api/upload', { method: 'POST', body: fd });
      const data = await res.json();
      uploadedAttachments.push(data);
      const chip = document.createElement('div');
      chip.className = 'flex items-center gap-1 px-2 py-1 bg-indigo-50 border border-indigo-200 rounded text-xs text-indigo-700';
      chip.innerHTML = `📎 ${file.name} <button class="ml-1 text-indigo-400 hover:text-red-500" onclick="removeFile('${data.path}', this)">✕</button>`;
      preview.appendChild(chip);
    } catch (e) {
      appendError(`上传失败：${file.name}`);
    }
  }
}

function removeFile(path, btn) {
  uploadedAttachments = uploadedAttachments.filter(item => item.path !== path);
  btn.parentElement.remove();
  if (uploadedAttachments.length === 0) {
    document.getElementById('file-preview').classList.add('hidden');
  }
}

// ── 发送消息 ─────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('new-chat-btn').addEventListener('click', newChat);
document.getElementById('input-text').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// 自动调整 textarea 高度
inputArea.addEventListener('input', () => {
  inputArea.style.height = 'auto';
  inputArea.style.height = Math.min(inputArea.scrollHeight, 160) + 'px';
});

async function sendMessage() {
  const text = inputArea.value.trim();
  if (!text) return;

  const pending = findLatestPendingConfirmation();
  const normalizedText = text.replace(/\s/g, '');
  if (uploadedAttachments.length === 0 && pending && ['确认', '确认执行', '同意'].includes(normalizedText)) {
    inputArea.value = '';
    inputArea.style.height = 'auto';
    document.getElementById('empty-hint')?.remove();
    appendUserMessage(text, []);
    await confirmTool(pending.confirmationId, pending.agentMsgId);
    return;
  }

  const provider = document.getElementById('provider-select').value;
  const attachments = [...uploadedAttachments];

  // 清空输入
  inputArea.value = '';
  inputArea.style.height = 'auto';
  uploadedAttachments = [];
  document.getElementById('file-preview').innerHTML = '';
  document.getElementById('file-preview').classList.add('hidden');

  // 隐藏提示
  document.getElementById('empty-hint')?.remove();

  // 显示用户消息
  appendUserMessage(text, attachments);

  // 禁用发送
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.innerHTML = '<svg class="w-4 h-4 spinner inline" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>';

  // 占位 agent 消息
  const agentMsgId = 'agent-' + Date.now();
  appendAgentPlaceholder(agentMsgId);

  try {
    await streamChat(agentMsgId, { text, attachments, provider, session_id: sessionId });
  } catch (e) {
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, attachments, provider, session_id: sessionId }),
      });
      if (!res.ok) {
        const err = await res.json();
        updateAgentMessage(agentMsgId, null, null, err.detail || '请求失败');
      } else {
        const data = await res.json();
        updateAgentMessage(agentMsgId, data.reply, data.steps, null);
      }
    } catch (fallbackError) {
      updateAgentMessage(agentMsgId, null, null, '网络错误：' + fallbackError.message);
    }
  } finally {
    btn.disabled = false;
    btn.textContent = '发送';
  }
}

async function newChat() {
  closeConfirmDialog();
  confirmingIds.clear();
  messageStates.clear();
  uploadedAttachments = [];
  document.getElementById('file-preview').innerHTML = '';
  document.getElementById('file-preview').classList.add('hidden');

  const oldSessionId = sessionId;
  sessionId = createSessionId();
  ss.setItem('czon_agent_session_id', sessionId);

  document.getElementById('chat-box').innerHTML = '<div id="empty-hint" class="text-center text-gray-400 text-sm mt-16">发送消息开始对话</div>';

  try {
    await fetch('/api/session/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: oldSessionId }),
    });
  } catch {
    // 本地已经切换到新会话，服务端清理失败不影响继续使用。
  }
}

async function streamChat(agentMsgId, payload) {
  const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  if (!res.ok || !res.body) throw new Error('流式接口不可用');

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  const steps = [];
  let reply = '';

  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });

    const chunks = buffer.split('\n\n');
    buffer = chunks.pop() || '';

    for (const chunk of chunks) {
      const event = parseSseChunk(chunk);
      if (!event) continue;

      if (event.event === 'tool_result' || event.event === 'confirmation_required') {
        steps.push(event.data);
        updateAgentMessage(agentMsgId, reply || '执行中…', steps, null);
        if (event.event === 'confirmation_required') {
          showConfirmDialog(event.data, agentMsgId);
        }
      } else if (event.event === 'agent_start') {
        updateAgentMessage(agentMsgId, '已连接，等待模型决策…', steps, null);
      } else if (event.event === 'assistant_delta') {
        reply += event.data.text || '';
        updateAgentMessage(agentMsgId, reply, steps, null);
      } else if (event.event === 'agent_done') {
        reply = event.data.reply || '';
        updateAgentMessage(agentMsgId, reply, steps, null);
      } else if (event.event === 'agent_error') {
        updateAgentMessage(agentMsgId, null, null, event.data.error || '请求失败');
      }
    }
  }
}

async function confirmTool(confirmationId, agentMsgId) {
  if (confirmingIds.has(confirmationId)) return;
  confirmingIds.add(confirmationId);

  const state = messageStates.get(agentMsgId) || { reply: '', steps: [] };
  const confirmedStep = state.steps.find(s => {
    const confirmation = s.result && s.result.meta && s.result.meta.confirmation;
    return confirmation && confirmation.id === confirmationId;
  });
  if (confirmedStep) {
    confirmedStep.result.meta.confirmation.executed = true;
    updateAgentMessage(agentMsgId, state.reply, state.steps, null);
  }

  try {
    const res = await fetch('/api/tool/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ confirmation_id: confirmationId }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '确认执行失败');

    state.steps.push(data.step);
    state.reply = summarizeConfirmedStep(data.step);
    updateAgentMessage(agentMsgId, state.reply, state.steps, null);
    closeConfirmDialog();
  } catch (e) {
    if (confirmedStep) {
      confirmedStep.result.meta.confirmation.executed = false;
    }
    state.steps.push({
      type: 'tool_call',
      name: 'confirm',
      args: { confirmation_id: confirmationId },
      result: {
        ok: false,
        data: null,
        error: { type: 'ConfirmationExecuteError', message: e.message, recoverable: true },
        meta: {},
      },
    });
    updateAgentMessage(agentMsgId, state.reply || '确认执行失败。', state.steps, null);
  } finally {
    confirmingIds.delete(confirmationId);
  }
}

function summarizeConfirmedStep(step) {
  const result = step.result || {};
  const data = result.data || {};
  if (!result.ok) {
    const message = result.error && result.error.message ? result.error.message : '确认后的工具执行失败。';
    return `确认后的操作执行失败：${message}`;
  }
  if (step.name === 'bash' && typeof data.exit_code !== 'undefined') {
    const stdout = (data.stdout || '').trim();
    return stdout ? `确认后的命令已执行，输出：\n${stdout}` : '确认后的命令已执行，未产生输出。';
  }
  return '确认后的操作已执行。';
}

function showConfirmDialog(step, agentMsgId) {
  const result = step.result || {};
  const confirmation = result.meta && result.meta.confirmation;
  if (!confirmation || !confirmation.id) return;

  closeConfirmDialog();

  const command = confirmation.args && confirmation.args.command
    ? confirmation.args.command
    : JSON.stringify(confirmation.args || step.args);

  const overlay = document.createElement('div');
  overlay.id = 'confirm-modal';
  overlay.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/30 px-4';
  overlay.innerHTML = `<div class="bg-white rounded-lg shadow-xl border border-gray-200 w-full max-w-lg p-5">
    <div class="text-sm font-semibold text-gray-900 mb-2">需要确认执行</div>
    <div class="text-sm text-gray-600 mb-3">${escHtml(confirmation.reason || '该操作需要确认。')}</div>
    <pre class="text-xs bg-gray-50 border border-gray-200 rounded p-3 overflow-x-auto mb-4">${escHtml(command)}</pre>
    <div class="flex justify-end gap-2">
      <button class="px-3 py-1.5 rounded border border-gray-200 text-sm text-gray-700 hover:bg-gray-50"
        onclick="closeConfirmDialog()">取消</button>
      <button class="px-3 py-1.5 rounded bg-amber-600 text-sm text-white hover:bg-amber-700"
        onclick="confirmTool('${escHtml(confirmation.id)}', '${escHtml(agentMsgId)}')">确认执行</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function closeConfirmDialog() {
  document.getElementById('confirm-modal')?.remove();
}

function findLatestPendingConfirmation() {
  const entries = Array.from(messageStates.entries()).reverse();
  for (const [agentMsgId, state] of entries) {
    const steps = [...(state.steps || [])].reverse();
    for (const step of steps) {
      const confirmation = step.result && step.result.meta && step.result.meta.confirmation;
      if (confirmation && confirmation.id && !confirmation.executed) {
        return { confirmationId: confirmation.id, agentMsgId };
      }
    }
  }
  return null;
}

function parseSseChunk(chunk) {
  const lines = chunk.split('\n');
  const eventLine = lines.find(line => line.startsWith('event: '));
  const dataLine = lines.find(line => line.startsWith('data: '));
  if (!eventLine || !dataLine) return null;
  try {
    return {
      event: eventLine.slice(7).trim(),
      data: JSON.parse(dataLine.slice(6)),
    };
  } catch {
    return null;
  }
}

// ── DOM 工具函数 ─────────────────────────────────────────
function appendUserMessage(text, attachments) {
  const box = document.getElementById('chat-box');
  const wrap = document.createElement('div');
  wrap.className = 'flex justify-end';
  const bubble = document.createElement('div');
  bubble.className = 'msg-user rounded-2xl px-4 py-3 max-w-lg text-sm text-gray-800 whitespace-pre-wrap';
  bubble.textContent = text;
  if (attachments.length) {
    const files = document.createElement('div');
    files.className = 'mt-1 text-xs text-gray-400';
    files.textContent = '📎 ' + attachments.map(item => item.name || item.path.split('/').pop()).join(', ');
    bubble.appendChild(files);
  }
  wrap.appendChild(bubble);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function appendAgentPlaceholder(id) {
  const box = document.getElementById('chat-box');
  const wrap = document.createElement('div');
  wrap.id = id;
  wrap.className = 'flex justify-start';
  wrap.innerHTML = `<div class="msg-agent rounded-2xl px-4 py-3 max-w-2xl text-sm text-gray-500 italic">
    <svg class="w-4 h-4 spinner inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
    </svg>思考中…</div>`;
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function updateAgentMessage(id, reply, steps, error) {
  const wrap = document.getElementById(id);
  if (!wrap) return;

  if (!error) {
    messageStates.set(id, { reply, steps: steps || [] });
  }

  if (error) {
    wrap.innerHTML = `<div class="msg-agent rounded-2xl px-4 py-3 max-w-2xl text-sm text-red-600">${escHtml(error)}</div>`;
    document.getElementById('chat-box').scrollTop = 9999;
    return;
  }

  let html = '';

  // 工具调用步骤
  if (steps && steps.length) {
    html += '<div class="space-y-1 mb-3">';
    steps.forEach((s, i) => {
      const argsStr = JSON.stringify(s.args).slice(0, 80);
      const result = s.result || {};
      const error = result.error;
      const isConfirm = error && error.type === 'ConfirmationRequired';
      const isError = error && error.type !== 'ConfirmationRequired';
      const confirmation = result.meta && result.meta.confirmation;
      const confirmationId = confirmation && !confirmation.executed && confirmation.id;
      const rowClass = isConfirm
        ? 'bg-amber-50 border-l-3 border-amber-400 text-amber-700'
        : isError
          ? 'bg-red-50 border-l-3 border-red-400 text-red-700'
          : 'tool-row text-indigo-700';
      const icon = isConfirm ? '⚠️' : isError ? '✕' : '🔧';
      const detail = JSON.stringify(result, null, 2);
      const detailId = `detail-${id}-${i}`;
      html += `<div class="${rowClass} rounded px-3 py-1.5 text-xs cursor-pointer select-none"
        onclick="document.getElementById('${detailId}').classList.toggle('open')">
        ${icon} <strong>${escHtml(s.name)}</strong>(${escHtml(argsStr)}…)
        <div id="${detailId}" class="tool-detail mt-1 text-gray-500 font-mono text-xs">${escHtml(detail)}</div>
        ${confirmationId ? `<button class="mt-2 px-2 py-1 rounded bg-amber-600 text-white hover:bg-amber-700"
          onclick="event.stopPropagation(); confirmTool('${escHtml(confirmationId)}', '${escHtml(id)}')">确认执行</button>` : ''}
      </div>`;
    });
    html += '</div>';
  }

  // 最终回复：支持少量 Markdown 链接，主要用于下载文件
  html += `<div class="text-sm text-gray-800 whitespace-pre-wrap leading-relaxed">${renderMessage(reply)}</div>`;

  wrap.innerHTML = `<div class="msg-agent rounded-2xl px-4 py-3 max-w-2xl">${html}</div>`;
  document.getElementById('chat-box').scrollTop = 9999;
}

function appendError(msg) {
  const box = document.getElementById('chat-box');
  const el = document.createElement('div');
  el.className = 'text-center text-red-500 text-xs';
  el.textContent = msg;
  box.appendChild(el);
}

function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderMessage(text) {
  const escaped = escHtml(text);
  return escaped.replace(/\[([^\]\n]+)\]\((\/download\/[^)\s]+)\)/g, (_match, label, href) => {
    return `<a href="${href}" target="_blank" rel="noopener" class="inline-flex items-center px-2 py-1 rounded bg-indigo-50 text-indigo-700 border border-indigo-200 hover:bg-indigo-100">${label}</a>`;
  });
}

function createSessionId() {
  if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
  return 'session-' + Date.now() + '-' + Math.random().toString(16).slice(2);
}

// ── 启动 ─────────────────────────────────────────────────
loadProviders();
</script>
</body>
</html>
