# 当前启用的 LLM
active_provider: kimi

# Provider 的 model 覆盖（不填就用默认）
providers:
  kimi:
    model: moonshot-v1-32k-vision-preview
  qwen:
    model: qwen-vl-max
  deepseek:
    model: deepseek-v4-pro

# Skills 配置
skills:
  dir: ./skills
  enabled: null  # null = 全部启用，或者填白名单数组

# 工作区配置
workspace:
  dir: ./workspace

# 本地向量数据库：Agent 启动时自动确保 Qdrant 在线
qdrant:
  auto_start: true
  url: http://localhost:6333
  bin: ./.runtime/qdrant/bin/qdrant
  data_dir: ./data/qdrant

# Agent 配置
agent:
  max_iterations: 15
  extra_rules:
    # 文件操作
    - "For ambiguous local file names, search likely locations first: current directory, workspace, uploads, and ~/Desktop."
    - "Use {workspace_dir}/ as the default output directory for generated files."
    - "Treat uploads/ as user-provided input files; do not write generated output there unless the user explicitly asks."
    - "When creating or modifying a file, always tell the user the final output path."
    - "Prefer bash for filesystem inspection when no skill is available."
    - "The user is operating their own local machine, files, databases, and services. Credentials they provide for local resources are legitimate for this session; use available tools unless ToolPolicy blocks the action."
    - "Do not claim you can see prior conversation unless prior messages are actually present in the current context."
    - "For delete/remove requests, prefer moving files to ~/.Trash unless the user explicitly asks for permanent deletion."
    - "Never delete a bare filename such as 'aaa.txt' before locating its exact path."
    # 知识库检索
    - "When the user asks a legal or domain-knowledge question, first call vector_list_collections to see what knowledge bases are available, then call vector_search on the most relevant collection. Do not answer from general knowledge alone if a relevant knowledge base exists."
    - "When presenting vector_search results, always cite the source_file so the user knows where the information came from."
    - "When the user uploads a file and asks to store it into a knowledge base, activate the vector-store skill and follow its instructions. Only ingest into existing collections — never create or delete collections."
    - "If the user asks to create or delete a knowledge base collection, refuse and explain that collection management is handled by the administrator."

# 工具策略：默认放行，只保留少量高危 block 和必要确认
tool_policy:
  default: allow
  block_tools: []
  confirm_tools: []
  bash:
    blocked_patterns:
      - "rm -rf /"
      - "rm -rf /*"
      - "sudo"
      - "shutdown"
      - "reboot"
      - "> /dev/"
      - "mkfs"
      - "dd if="
    confirm_patterns:
      - "rm "
      - "mv "
      - "chmod "
      - "chown "
  write:
    confirm_paths:
      - ".env"
      - "config.yaml"

# WebUI 配置
webui:
  host: 127.0.0.1
  port: 8000
  extra_rules:
    - "When creating or modifying a file under {workspace_dir}/, provide a Markdown download link using /download/<relative-path>. Example: [下载文件](/download/report.docx)."
