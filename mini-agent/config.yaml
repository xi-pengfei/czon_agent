# 当前启用的 LLM
active_provider: kimi

# Provider 的 model 覆盖（不填就用默认）
providers:
  kimi:
    model: moonshot-v1-32k-vision-preview
  qwen:
    model: qwen-vl-max
  deepseek:
    model: deepseek-chat

# Skills 配置
skills:
  dir: ./skills
  enabled: null  # null = 全部启用，或者填白名单数组

# Agent 配置
agent:
  max_iterations: 15

# WebUI 配置
webui:
  host: 127.0.0.1
  port: 8000
